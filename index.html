<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>解憂藥局｜會員管理系統</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #1f2933;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    .sidebar {
      background: #151719;
      color: #fff;
      padding: 22px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 26px;
      padding: 4px 6px;
    }

    .brand-title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .brand-subtitle {
      color: #aab0b8;
      font-size: 13px;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav button {
      width: 100%;
      background: transparent;
      color: #cbd2da;
      text-align: left;
      padding: 13px 14px;
      border-radius: 14px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav button.active {
      background: #fff;
      color: #111;
    }

    .main {
      padding: 24px;
      max-width: 1280px;
      width: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
    }

    .page-title {
      font-size: 30px;
      font-weight: 950;
      margin: 0;
    }

    .page-desc {
      color: #6b7280;
      margin-top: 6px;
      font-size: 14px;
    }

    .status-pill {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 10px 14px;
      color: #475569;
      font-weight: 800;
      white-space: nowrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.06);
      border: 1px solid #edf0f2;
    }

    .stat-label {
      color: #64748b;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 950;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
    }

    .panel {
      background: #fff;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.06);
      border: 1px solid #edf0f2;
      margin-bottom: 16px;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 950;
      margin: 0 0 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .form-row {
      display: grid;
      gap: 7px;
      margin-bottom: 12px;
    }

    label {
      color: #475569;
      font-size: 13px;
      font-weight: 900;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #d8dee6;
      background: #fff;
      border-radius: 13px;
      padding: 12px 13px;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.08);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn {
      background: #111;
      color: #fff;
      border-radius: 13px;
      padding: 12px 16px;
      font-weight: 950;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .btn.secondary {
      background: #eef2f7;
      color: #111;
    }

    .btn.warning {
      background: #b45309;
      color: #fff;
    }

    .btn.danger {
      background: #b91c1c;
      color: #fff;
    }

    .btn.green {
      background: #047857;
      color: #fff;
    }

    .table-wrap {
      width: 100%;
      overflow: auto;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: #fff;
    }

    th,
    td {
      padding: 13px 14px;
      border-bottom: 1px solid #eef0f2;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: #f8fafc;
      color: #475569;
      font-weight: 950;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .member-name {
      font-weight: 950;
    }

    .muted {
      color: #64748b;
      font-size: 13px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      background: #eef2f7;
      color: #334155;
      font-weight: 850;
      font-size: 12px;
      white-space: nowrap;
    }

    .tag.green {
      background: #dcfce7;
      color: #166534;
    }

    .tag.orange {
      background: #ffedd5;
      color: #9a3412;
    }

    .tag.red {
      background: #fee2e2;
      color: #991b1b;
    }

    .message {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #fff8d7;
      color: #6b4f00;
      white-space: pre-wrap;
      font-weight: 800;
      display: none;
    }

    .message.show {
      display: block;
    }

    .scanner-box {
      background: #0f172a;
      border-radius: 18px;
      overflow: hidden;
      min-height: 260px;
      display: grid;
      place-items: center;
      color: #fff;
      margin-bottom: 14px;
    }

    video {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      display: none;
    }

    video.active {
      display: block;
    }

    .scan-placeholder {
      padding: 24px;
      text-align: center;
      color: #cbd5e1;
      line-height: 1.7;
    }

    .member-card {
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(135deg, #fff7c2, #d2b85a 42%, #373126 100%);
      color: #111;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.16);
      margin-bottom: 14px;
    }

    .member-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    .member-card-title {
      font-size: 23px;
      font-weight: 950;
    }

    .member-card-points {
      background: rgba(0, 0, 0, 0.62);
      color: #ffe84d;
      padding: 9px 12px;
      border-radius: 999px;
      font-weight: 950;
    }

    .member-meta {
      display: grid;
      gap: 5px;
      color: #222;
      font-weight: 800;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        height: auto;
      }

      .nav {
        grid-template-columns: repeat(3, 1fr);
      }

      .nav button {
        justify-content: center;
        text-align: center;
        font-size: 13px;
        padding: 11px 8px;
      }

      .main {
        padding: 16px;
      }

      .cards {
        grid-template-columns: repeat(2, 1fr);
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">解憂藥局</div>
        <div class="brand-subtitle">stressrelief_shop 會員管理系統</div>
      </div>

      <nav class="nav">
        <button class="active" data-page="dashboard">📊 總覽</button>
        <button data-page="members">👥 會員清單</button>
        <button data-page="broadcast">📣 發送內容</button>
        <button data-page="scan">▣ 掃碼會員</button>
        <button data-page="wallet">💰 儲值 / 使用</button>
        <button data-page="logs">🧾 點數紀錄</button>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h1 class="page-title" id="pageTitle">總覽</h1>
          <div class="page-desc" id="pageDesc">會員、點數、儲值與發送紀錄管理</div>
        </div>

        <div class="status-pill" id="apiStatus">DEMO 模式</div>
      </div>

      <section id="page"></section>
    </main>
  </div>

  <script>
    const GAS_API_URL = '';
    const ADMIN_PIN = '9753';
    const DEMO_MODE = !GAS_API_URL;

    const state = {
      page: 'dashboard',
      loading: false,
      members: [],
      pointLogs: [],
      walletLogs: [],
      selectedMember: null,
      scannerStream: null,
      scanTimer: null,
    };

    const demoMembers = [
      {
        memberId: 'XYYJ-C43A0EA9',
        barcodeValue: 'XYYJ-C43A0EA9',
        displayName: '王小明',
        phone: '0912345678',
        level: '一般會員',
        points: 320,
        storedValue: 1000,
        totalSpend: 2680,
        tags: '高消費,啤酒',
        lastVisitAt: '2026/07/06 21:10',
        createdAt: '2026/06/20 18:22',
      },
      {
        memberId: 'XYYJ-A88F01C2',
        barcodeValue: 'XYYJ-A88F01C2',
        displayName: '陳品安',
        phone: '0922000111',
        level: 'VIP',
        points: 860,
        storedValue: 2500,
        totalSpend: 9200,
        tags: 'VIP,常客',
        lastVisitAt: '2026/07/05 20:36',
        createdAt: '2026/06/12 14:02',
      },
      {
        memberId: 'XYYJ-B710D39E',
        barcodeValue: 'XYYJ-B710D39E',
        displayName: '林柔柔',
        phone: '0988123456',
        level: '一般會員',
        points: 120,
        storedValue: 0,
        totalSpend: 860,
        tags: '新客',
        lastVisitAt: '2026/06/29 19:14',
        createdAt: '2026/06/29 19:10',
      },
    ];

    const demoPointLogs = [
      {
        logId: 'P001',
        memberId: 'XYYJ-C43A0EA9',
        displayName: '王小明',
        type: '儲值',
        points: 500,
        beforePoints: 0,
        afterPoints: 500,
        note: '現金儲值',
        staff: '店員A',
        createdAt: '2026/07/06 20:30',
      },
      {
        logId: 'P002',
        memberId: 'XYYJ-C43A0EA9',
        displayName: '王小明',
        type: '使用',
        points: -180,
        beforePoints: 500,
        afterPoints: 320,
        note: '消費折抵',
        staff: '店員A',
        createdAt: '2026/07/06 21:10',
      },
    ];

    const demoWalletLogs = [
      {
        logId: 'W001',
        memberId: 'XYYJ-A88F01C2',
        displayName: '陳品安',
        type: '儲值',
        amount: 2000,
        beforeStoredValue: 500,
        afterStoredValue: 2500,
        payMethod: '現金',
        note: '會員儲值',
        staff: '店員B',
        createdAt: '2026/07/05 20:12',
      },
      {
        logId: 'W002',
        memberId: 'XYYJ-A88F01C2',
        displayName: '陳品安',
        type: '使用',
        amount: -360,
        beforeStoredValue: 2500,
        afterStoredValue: 2140,
        payMethod: '儲值金',
        note: '消費扣款',
        staff: '店員B',
        createdAt: '2026/07/05 20:36',
      },
    ];

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function money(value) {
      return Number(value || 0).toLocaleString('zh-TW');
    }

    function getNowText() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      return (
        d.getFullYear() +
        '/' +
        pad(d.getMonth() + 1) +
        '/' +
        pad(d.getDate()) +
        ' ' +
        pad(d.getHours()) +
        ':' +
        pad(d.getMinutes())
      );
    }

    async function api(action, payload = {}) {
      if (DEMO_MODE) {
        return mockApi(action, payload);
      }

      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8',
        },
        body: JSON.stringify({
          action,
          adminPin: ADMIN_PIN,
          ...payload,
        }),
      });

      const json = await res.json();

      if (!json.success) {
        throw new Error(json.message || 'API 錯誤');
      }

      return json.data;
    }

    async function mockApi(action, payload) {
      await new Promise((resolve) => setTimeout(resolve, 250));

      if (action === 'getDashboard') {
        return {
          members: demoMembers,
          pointLogs: demoPointLogs,
          walletLogs: demoWalletLogs,
        };
      }

      if (action === 'getMembers') {
        return {
          members: demoMembers,
        };
      }

      if (action === 'getLogs') {
        return {
          pointLogs: demoPointLogs,
          walletLogs: demoWalletLogs,
        };
      }

      if (action === 'findMember') {
        const keyword = String(payload.keyword || '').trim().toLowerCase();
        const found = demoMembers.find((m) => {
          return (
            String(m.memberId).toLowerCase() === keyword ||
            String(m.barcodeValue).toLowerCase() === keyword ||
            String(m.phone).toLowerCase() === keyword ||
            String(m.displayName).toLowerCase().includes(keyword)
          );
        });

        if (!found) {
          throw new Error('找不到會員');
        }

        return {
          member: found,
        };
      }

      if (action === 'adjustPoints') {
        const member = state.selectedMember || demoMembers[0];
        const amount = Number(payload.points || 0);
        const before = Number(member.points || 0);
        member.points = before + amount;

        const log = {
          logId: 'P' + Date.now(),
          memberId: member.memberId,
          displayName: member.displayName,
          type: amount >= 0 ? '儲值' : '使用',
          points: amount,
          beforePoints: before,
          afterPoints: member.points,
          note: payload.note || '',
          staff: payload.staff || '',
          createdAt: getNowText(),
        };

        demoPointLogs.unshift(log);

        return {
          member,
          log,
        };
      }

      if (action === 'adjustStoredValue') {
        const member = state.selectedMember || demoMembers[0];
        const amount = Number(payload.amount || 0);
        const before = Number(member.storedValue || 0);
        member.storedValue = before + amount;

        const log = {
          logId: 'W' + Date.now(),
          memberId: member.memberId,
          displayName: member.displayName,
          type: amount >= 0 ? '儲值' : '使用',
          amount,
          beforeStoredValue: before,
          afterStoredValue: member.storedValue,
          payMethod: payload.payMethod || '',
          note: payload.note || '',
          staff: payload.staff || '',
          createdAt: getNowText(),
        };

        demoWalletLogs.unshift(log);

        return {
          member,
          log,
        };
      }

      if (action === 'previewBroadcast') {
        return {
          count: filterMembersByPayload(payload).length,
          members: filterMembersByPayload(payload),
        };
      }

      if (action === 'sendBroadcast') {
        return {
          sentCount: filterMembersByPayload(payload).length,
        };
      }

      return {};
    }

    function filterMembersByPayload(payload) {
      let list = [...demoMembers];

      const minPoints = Number(payload.minPoints || 0);
      const minSpend = Number(payload.minSpend || 0);
      const level = String(payload.level || '').trim();
      const tag = String(payload.tag || '').trim().toLowerCase();
      const hasStoredValue = String(payload.hasStoredValue || '');

      if (minPoints > 0) {
        list = list.filter((m) => Number(m.points || 0) >= minPoints);
      }

      if (minSpend > 0) {
        list = list.filter((m) => Number(m.totalSpend || 0) >= minSpend);
      }

      if (level) {
        list = list.filter((m) => String(m.level || '') === level);
      }

      if (tag) {
        list = list.filter((m) => String(m.tags || '').toLowerCase().includes(tag));
      }

      if (hasStoredValue === 'yes') {
        list = list.filter((m) => Number(m.storedValue || 0) > 0);
      }

      if (hasStoredValue === 'no') {
        list = list.filter((m) => Number(m.storedValue || 0) <= 0);
      }

      return list;
    }

    function setPage(page) {
      state.page = page;

      document.querySelectorAll('.nav button').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.page === page);
      });

      render();
    }

    function setTitle(title, desc) {
      document.getElementById('pageTitle').textContent = title;
      document.getElementById('pageDesc').textContent = desc;
      document.getElementById('apiStatus').textContent = DEMO_MODE ? 'DEMO 模式' : '已連線 GAS';
    }

    function showMessage(id, text) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = text;
      el.classList.add('show');
    }

    function render() {
      if (state.page === 'dashboard') renderDashboard();
      if (state.page === 'members') renderMembers();
      if (state.page === 'broadcast') renderBroadcast();
      if (state.page === 'scan') renderScan();
      if (state.page === 'wallet') renderWallet();
      if (state.page === 'logs') renderLogs();
    }

    async function loadAll() {
      const data = await api('getDashboard');

      state.members = data.members || [];
      state.pointLogs = data.pointLogs || [];
      state.walletLogs = data.walletLogs || [];
    }

    async function renderDashboard() {
      setTitle('總覽', '會員、點數、儲值與使用紀錄');

      await loadAll();

      const totalMembers = state.members.length;
      const totalPoints = state.members.reduce((sum, m) => sum + Number(m.points || 0), 0);
      const totalStoredValue = state.members.reduce((sum, m) => sum + Number(m.storedValue || 0), 0);
      const totalSpend = state.members.reduce((sum, m) => sum + Number(m.totalSpend || 0), 0);

      document.getElementById('page').innerHTML = `
        <div class="cards">
          <div class="stat-card">
            <div class="stat-label">會員總數</div>
            <div class="stat-value">${money(totalMembers)}</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">未使用點數</div>
            <div class="stat-value">${money(totalPoints)}</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">儲值金餘額</div>
            <div class="stat-value">$${money(totalStoredValue)}</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">累積消費</div>
            <div class="stat-value">$${money(totalSpend)}</div>
          </div>
        </div>

        <div class="grid-2">
          <div class="panel">
            <h2 class="panel-title">近期會員</h2>
            ${renderMembersTable(state.members.slice(0, 6))}
          </div>

          <div class="panel">
            <h2 class="panel-title">近期點數紀錄</h2>
            ${renderPointLogsTable(state.pointLogs.slice(0, 6))}
          </div>
        </div>
      `;
    }

    async function renderMembers() {
      setTitle('會員清單', '查詢會員資料、點數、儲值金與標籤');

      const data = await api('getMembers');
      state.members = data.members || [];

      document.getElementById('page').innerHTML = `
        <div class="panel">
          <h2 class="panel-title">會員搜尋</h2>

          <div class="form-grid">
            <div class="form-row">
              <label>關鍵字</label>
              <input id="memberSearch" placeholder="姓名 / 電話 / 會員編號 / 標籤" />
            </div>

            <div class="form-row">
              <label>會員等級</label>
              <select id="memberLevelFilter">
                <option value="">全部</option>
                <option value="一般會員">一般會員</option>
                <option value="VIP">VIP</option>
              </select>
            </div>
          </div>

          <div class="btn-row">
            <button class="btn" id="filterMembersBtn">查詢</button>
            <button class="btn secondary" id="resetMembersBtn">重設</button>
          </div>
        </div>

        <div class="panel">
          <h2 class="panel-title">會員列表</h2>
          <div id="membersTable">${renderMembersTable(state.members)}</div>
        </div>
      `;

      document.getElementById('filterMembersBtn').onclick = () => {
        const keyword = document.getElementById('memberSearch').value.trim().toLowerCase();
        const level = document.getElementById('memberLevelFilter').value;

        const filtered = state.members.filter((m) => {
          const haystack = [
            m.displayName,
            m.phone,
            m.memberId,
            m.barcodeValue,
            m.tags,
          ].join(' ').toLowerCase();

          if (keyword && !haystack.includes(keyword)) return false;
          if (level && m.level !== level) return false;

          return true;
        });

        document.getElementById('membersTable').innerHTML = renderMembersTable(filtered);
      };

    function renderScan() {
      setTitle('掃碼會員', '掃描會員 QR Code，快速查詢並處理點數');

              <video id="scanVideo" playsinline></video>
              <div class="scan-placeholder" id="scanPlaceholder">
                可使用手機或平板相機掃描會員 QR Code。<br />
                若瀏覽器不支援掃描，可直接輸入會員編號。
              </div>
            </div>

            <div class="btn-row">
              <button class="btn" id="startScanBtn">啟動相機掃描</button>

            </div>

            <div class="form-row" style="margin-top:14px;">
              <label>會員編號 / QR Code 內容 / 電話 / 姓名</label>
              <input id="scanKeyword" placeholder="例如 XYYJ-C43A0EA9" />
            </div>

            <div class="btn-row">
              <button class="btn green" id="findScanMemberBtn">查詢會員</button>
            </div>

            <div id="scanMsg" class="message"></div>
          </div>

          <div class="panel">

      `;

      document.getElementById('findScanMemberBtn').onclick = () => {

      document.getElementById('startScanBtn').onclick = startScanner;
      document.getElementById('stopScanBtn').onclick = stopScanner;
    }

    async function startScanner() {
      const video = document.getElementById('scanVideo');
      const placeholder = document.getElementById('scanPlaceholder');

      if (!('BarcodeDetector' in window)) {
        showMessage('scanMsg', '此瀏覽器不支援 BarcodeDetector，請直接輸入會員編號。');
        return;
      }

      try {
        state.scannerStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'environment',
          },
        });

        video.srcObject = state.scannerStream;
        video.classList.add('active');
        placeholder.style.display = 'none';
        await video.play();

        const detector = new BarcodeDetector({
          formats: ['qr_code', 'code_128'],
        });

        state.scanTimer = setInterval(async () => {
          try {
            const codes = await detector.detect(video);

            if (codes.length) {
              const value = codes[0].rawValue || '';
              document.getElementById('scanKeyword').value = value;
              stopScanner();
              findMemberFromInput('scanKeyword', 'scanMsg', 'scanMemberResult');
            }
          } catch (err) {
            console.warn(err);
          }
        }, 600);
      } catch (err) {
        showMessage('scanMsg', '相機啟動失敗：' + (err.message || String(err)));
      }
    }

    function stopScanner() {
      if (state.scanTimer) {
        clearInterval(state.scanTimer);
        state.scanTimer = null;
      }

      if (state.scannerStream) {
        state.scannerStream.getTracks().forEach((track) => track.stop());
        state.scannerStream = null;
      }

      const video = document.getElementById('scanVideo');
      const placeholder = document.getElementById('scanPlaceholder');

      if (video) {
        video.classList.remove('active');
        video.srcObject = null;
      }

      if (placeholder) {
        placeholder.style.display = 'block';
      }
    }

    async function findMemberFromInput(inputId, msgId, resultId) {
      const keyword = document.getElementById(inputId).value.trim();

      if (!keyword) {
        showMessage(msgId, '請輸入會員編號、電話或姓名。');
        return;
      }

      try {
        const data = await api('findMember', {
          keyword,
        });

        state.selectedMember = data.member;

        document.getElementById(resultId).innerHTML = renderSelectedMember(data.member);
        showMessage(msgId, '已找到會員：' + data.member.displayName);
      } catch (err) {
        state.selectedMember = null;
        document.getElementById(resultId).innerHTML = '<div class="muted">找不到會員。</div>';
        showMessage(msgId, err.message || String(err));
      }
    }

      document.getElementById('page').innerHTML = `

                <label>操作項目</label>

                  <option value="現金">現金</option>
                  <option value="轉帳">轉帳</option>
                  <option value="刷卡">刷卡</option>
                  <option value="Line Pay">Line Pay</option>
                  <option value="儲值金">儲值金</option>
                </select>
              </div>

              <div class="form-row">
                <label>店員</label>
                <input id="staffName" placeholder="例如 店員A" />
              </div>

              <div class="form-row">
                <label>備註</label>
                <input id="walletNote" placeholder="例如 現金儲值 / 消費折抵" />
              </div>

              <button class="btn green" id="submitWalletBtn">確認送出</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById('findWalletMemberBtn').onclick = () => {
        findMemberFromInput('walletKeyword', 'walletMsg', 'walletMemberResult');
      };

      document.getElementById('submitWalletBtn').onclick = submitWallet;
    }

    async function submitWallet() {
      const msgId = 'walletMsg';

      if (!state.selectedMember) {
        showMessage(msgId, '請先查詢會員。');
        return;
      }

      const target = document.getElementById('walletTarget').value;
      const type = document.getElementById('walletType').value;
      const rawAmount = Number(document.getElementById('walletAmount').value || 0);

      if (!rawAmount || rawAmount <= 0) {
        showMessage(msgId, '請輸入正確的數量 / 金額。');
        return;
      }

      const amount = type === 'use' ? -rawAmount : rawAmount;

      const payload = {
        memberId: state.selectedMember.memberId,
        barcodeValue: state.selectedMember.barcodeValue,
        amount,
        points: amount,
        payMethod: document.getElementById('payMethod').value,
        staff: document.getElementById('staffName').value.trim(),
        note: document.getElementById('walletNote').value.trim(),
      };

      try {
        let data;

        if (target === 'points') {
          data = await api('adjustPoints', payload);
        } else {
          data = await api('adjustStoredValue', payload);
        }

        state.selectedMember = data.member;

        document.getElementById('walletMemberResult').innerHTML = renderSelectedMember(data.member);
        document.getElementById('walletAmount').value = '';
        document.getElementById('walletNote').value = '';

        showMessage(msgId, '已完成更新。\n目前點數：' + money(data.member.points) + '\n儲值金：$' + money(data.member.storedValue));
      } catch (err) {
        showMessage(msgId, err.message || String(err));
      }
    }

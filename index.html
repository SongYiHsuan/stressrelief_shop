<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>解憂藥局｜會員管理系統</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #1f2933;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    .sidebar {
      background: #151719;
      color: #fff;
      padding: 22px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 26px;
      padding: 4px 6px;
    }

    .brand-title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .brand-subtitle {
      color: #aab0b8;
      font-size: 13px;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav button {
      width: 100%;
      background: transparent;
      color: #cbd2da;
      text-align: left;
      padding: 13px 14px;
      border-radius: 14px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav button.active {
      background: #fff;
      color: #111;
    }

    .main {
      padding: 24px;
      max-width: 1280px;
      width: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
    }

    .page-title {
      font-size: 30px;
      font-weight: 950;
      margin: 0;
    }

    .page-desc {
      color: #6b7280;
      margin-top: 6px;
      font-size: 14px;
    }

    .status-pill {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 10px 14px;
      color: #475569;
      font-weight: 800;
      white-space: nowrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.06);
      border: 1px solid #edf0f2;
    }

    .stat-label {
      color: #64748b;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 950;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
    }

    .panel {
      background: #fff;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.06);
      border: 1px solid #edf0f2;
      margin-bottom: 16px;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 950;
      margin: 0 0 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .form-row {
      display: grid;
      gap: 7px;
      margin-bottom: 12px;
    }

    label {
      color: #475569;
      font-size: 13px;
      font-weight: 900;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #d8dee6;
      background: #fff;
      border-radius: 13px;
      padding: 12px 13px;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.08);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn {
      background: #111;
      color: #fff;
      border-radius: 13px;
      padding: 12px 16px;
      font-weight: 950;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .btn.secondary {
      background: #eef2f7;
      color: #111;
    }

    .btn.warning {
      background: #b45309;
      color: #fff;
    }

    .btn.danger {
      background: #b91c1c;
      color: #fff;
    }

    .btn.green {
      background: #047857;
      color: #fff;
    }

    .table-wrap {
      width: 100%;
      overflow: auto;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: #fff;
    }

    th,
    td {
      padding: 13px 14px;
      border-bottom: 1px solid #eef0f2;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: #f8fafc;
      color: #475569;
      font-weight: 950;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .member-name {
      font-weight: 950;
    }

    .muted {
      color: #64748b;
      font-size: 13px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      background: #eef2f7;
      color: #334155;
      font-weight: 850;
      font-size: 12px;
      white-space: nowrap;
    }

    .tag.green {
      background: #dcfce7;
      color: #166534;
    }

    .tag.orange {
      background: #ffedd5;
      color: #9a3412;
    }

    .tag.red {
      background: #fee2e2;
      color: #991b1b;
    }

    .message {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #fff8d7;
      color: #6b4f00;
      white-space: pre-wrap;
      font-weight: 800;
      display: none;
    }

    .message.show {
      display: block;
    }

    .scanner-box {
      background: #0f172a;
      border-radius: 18px;
      overflow: hidden;
      min-height: 260px;
      display: grid;
      place-items: center;
      color: #fff;
      margin-bottom: 14px;
    }

    video {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      display: none;
    }

    video.active {
      display: block;
    }

    .scan-placeholder {
      padding: 24px;
      text-align: center;
      color: #cbd5e1;
      line-height: 1.7;
    }

    .member-card {
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(135deg, #fff7c2, #d2b85a 42%, #373126 100%);
      color: #111;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.16);
      margin-bottom: 14px;
    }

    .member-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    .member-card-title {
      font-size: 23px;
      font-weight: 950;
    }

    .member-card-points {
      background: rgba(0, 0, 0, 0.62);
      color: #ffe84d;
      padding: 9px 12px;
      border-radius: 999px;
      font-weight: 950;
    }

    .member-meta {
      display: grid;
      gap: 5px;
      color: #222;
      font-weight: 800;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        height: auto;
      }

      .nav {
        grid-template-columns: repeat(3, 1fr);
      }

      .nav button {
        justify-content: center;
        text-align: center;
        font-size: 13px;
        padding: 11px 8px;
      }

      .main {
        padding: 16px;
      }

      .cards {
        grid-template-columns: repeat(2, 1fr);
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    .scan-input-panel {
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .scan-input-title {
      font-size: 18px;
      font-weight: 950;
      margin-bottom: 6px;
    }

    .scan-input-desc {
      color: #64748b;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 14px;
      font-weight: 700;
    }

    .member-card.full {
      background: #fff;
      color: #111827;
      border: 1px solid #e5e7eb;
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.08);
    }

    .member-card.full .member-card-header {
      border-bottom: 1px solid #eef0f2;
      padding-bottom: 14px;
      margin-bottom: 14px;
    }

    .member-card.full .member-card-title {
      font-size: 26px;
      color: #111827;
    }

    .member-card.full .member-card-points {
      background: #047857;
      color: #fff;
      font-size: 20px;
      padding: 11px 16px;
    }

    .member-detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .member-detail-item {
      background: #f8fafc;
      border: 1px solid #eef0f2;
      border-radius: 14px;
      padding: 11px 12px;
    }

    .member-detail-label {
      color: #64748b;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 5px;
    }

    .member-detail-value {
      color: #111827;
      font-size: 15px;
      font-weight: 950;
      word-break: break-word;
    }

    .member-detail-value.big {
      font-size: 22px;
      color: #047857;
    }

    .scan-help-box {
      background: #ecfdf5;
      border: 1px solid #bbf7d0;
      color: #166534;
      border-radius: 14px;
      padding: 12px;
      font-weight: 850;
      line-height: 1.6;
      margin-top: 12px;
    }


    /* compact scan/member layout */
    .scan-input-panel {
      padding: 12px 14px !important;
      margin-bottom: 8px !important;
    }

    .scan-input-panel .form-row {
      margin-bottom: 8px !important;
    }

    .scan-input-panel input {
      padding: 9px 11px !important;
      border-radius: 10px !important;
      font-size: 15px !important;
    }

    .scan-input-panel .btn-row {
      margin-top: 6px !important;
    }

    .scan-input-panel .btn {
      padding: 9px 14px !important;
      border-radius: 11px !important;
    }

    .panel {
      padding: 14px !important;
      margin-bottom: 10px !important;
      border-radius: 16px !important;
    }

    .panel-title {
      font-size: 18px !important;
      margin-bottom: 10px !important;
    }

    .member-card.full {
      padding: 14px !important;
      margin-bottom: 0 !important;
      border-radius: 16px !important;
    }

    .member-card.full .member-card-header {
      padding-bottom: 10px !important;
      margin-bottom: 10px !important;
    }

    .member-card.full .member-card-title {
      font-size: 23px !important;
      line-height: 1.15 !important;
    }

    .member-card.full .muted {
      font-size: 12px !important;
      line-height: 1.35 !important;
    }

    .member-card.full .member-card-points {
      font-size: 18px !important;
      padding: 9px 14px !important;
    }

    .member-detail-grid {
      gap: 7px !important;
    }

    .member-detail-item {
      padding: 8px 10px !important;
      border-radius: 11px !important;
    }

    .member-detail-label {
      font-size: 11px !important;
      margin-bottom: 3px !important;
    }

    .member-detail-value {
      font-size: 14px !important;
      line-height: 1.25 !important;
    }

    .member-detail-value.big {
      font-size: 20px !important;
    }

    #scanMsg.message {
      display: none !important;
    }

    #walletMsg.message {
      margin-top: 8px !important;
      padding: 9px 10px !important;
      border-radius: 11px !important;
      font-size: 14px !important;
    }


    .query-loading {
      display: none;
      align-items: center;
      color: #64748b;
      font-size: 14px;
      font-weight: 900;
      padding: 9px 4px;
    }

    .query-loading.show {
      display: inline-flex;
    }


    /* LINE style broadcast editor */
    .line-editor-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) 360px;
      gap: 16px;
      align-items: start;
    }

    .message-type-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .message-type-tab {
      border: 1px solid #d8dee6;
      background: #fff;
      color: #334155;
      border-radius: 14px;
      padding: 14px 10px;
      font-weight: 950;
      text-align: center;
    }

    .message-type-tab.active {
      border-color: #06c755;
      background: #ecfdf5;
      color: #047857;
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.12);
    }

    .phone-preview-wrap {
      position: sticky;
      top: 18px;
    }

    .phone-preview {
      width: 320px;
      min-height: 620px;
      margin: 0 auto;
      background: #8fb3df;
      border: 12px solid #111;
      border-radius: 38px;
      overflow: hidden;
      box-shadow: 0 22px 50px rgba(15, 23, 42, 0.22);
    }

    .phone-preview-header {
      background: #f8fafc;
      padding: 14px 16px;
      font-weight: 950;
      color: #111827;
      border-bottom: 1px solid rgba(15, 23, 42, 0.08);
    }

    .phone-preview-body {
      padding: 18px 12px;
    }

    .line-bubble {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.14);
    }

    .line-bubble-img {
      width: 100%;
      height: 160px;
      background: #e5e7eb;
      display: grid;
      place-items: center;
      color: #64748b;
      font-weight: 900;
      overflow: hidden;
    }

    .line-bubble-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .line-bubble-content {
      padding: 14px;
    }

    .line-bubble-title {
      font-size: 18px;
      font-weight: 950;
      color: #111827;
      margin-bottom: 7px;
      line-height: 1.35;
    }

    .line-bubble-text {
      color: #475569;
      line-height: 1.55;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .line-bubble-button {
      margin-top: 12px;
      background: #06c755;
      color: #fff;
      text-align: center;
      border-radius: 999px;
      padding: 11px;
      font-weight: 950;
    }

    .preview-note {
      color: #64748b;
      font-size: 13px;
      line-height: 1.6;
      margin-top: 10px;
      text-align: center;
    }

    @media (max-width: 1100px) {
      .line-editor-grid {
        grid-template-columns: 1fr;
      }

      .phone-preview-wrap {
        position: static;
      }
    }

  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">解憂藥局</div>
        <div class="brand-subtitle">stressrelief_shop 會員管理系統</div>
      </div>

      <nav class="nav">
        <button class="active" data-page="dashboard">📊 總覽</button>
        <button data-page="members">👥 會員清單</button>
        <button data-page="broadcast">📣 發送內容</button>
        <button data-page="wallet">💰 儲值頁面</button>
        <button data-page="logs">🧾 儲值紀錄</button>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">

          <div class="page-desc" id="pageDesc">會員、儲值金與發送紀錄管理</div>

        <div class="status-pill" id="apiStatus">DEMO 模式</div>

      <section id="page"></section>
    </main>
  </div>

  <script>

    const ADMIN_PIN = '9753';
    const DEMO_MODE = !GAS_API_URL;

    const state = {

      loading: false,

    const demoMembers = [

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function money(value) {
      return Number(value || 0).toLocaleString('zh-TW');
    }

    function getNowText() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      return (
        d.getFullYear() +
        '/' +
        pad(d.getMonth() + 1) +
        '/' +
        pad(d.getDate()) +
        ' ' +
        pad(d.getHours()) +
        ':' +
        pad(d.getMinutes())
      );
    }

    async function api(action, payload = {}) {
      if (DEMO_MODE) {
        return mockApi(action, payload);
      }

      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8',
        },
        body: JSON.stringify({
          action,
          adminPin: ADMIN_PIN,
          ...payload,
        }),
      });

      const json = await res.json();

      if (!json.success) {
        throw new Error(json.message || 'API 錯誤');
      }

      return json.data;
    }

    async function mockApi(action, payload) {
      await new Promise((resolve) => setTimeout(resolve, 250));

      if (action === 'getDashboard') {
        return {
          members: demoMembers,
          pointLogs: demoPointLogs,
          walletLogs: demoWalletLogs,
        };
      }

      if (action === 'getMembers') {
        return {
          members: demoMembers,
        };
      }

      if (action === 'getLogs') {
        return {
          pointLogs: demoPointLogs,
          walletLogs: demoWalletLogs,
        };
      }

      if (action === 'findMember') {
        const keyword = String(payload.keyword || '').trim().toLowerCase();
        const found = demoMembers.find((m) => {
          return (
            String(m.memberId).toLowerCase() === keyword ||
            String(m.barcodeValue).toLowerCase() === keyword ||
            String(m.phone).toLowerCase() === keyword ||
            String(m.displayName).toLowerCase().includes(keyword)
          );
        });

        if (!found) {
          throw new Error('找不到會員');
        }

        return {
          member: found,
        };
      }

      if (action === 'adjustPoints') {
        const member = state.selectedMember || demoMembers[0];
        const amount = Number(payload.points || 0);
        const before = Number(member.points || 0);
        member.points = before + amount;

        const log = {
          logId: 'P' + Date.now(),
          memberId: member.memberId,
          displayName: member.displayName,
          type: amount >= 0 ? '儲值' : '使用',
          points: amount,
          beforePoints: before,
          afterPoints: member.points,
          note: payload.note || '',
          staff: payload.staff || '',
          createdAt: getNowText(),
        };

        demoPointLogs.unshift(log);

        return {
          member,
          log,
        };
      }

      if (action === 'adjustStoredValue') {
        const member = state.selectedMember || demoMembers[0];
        const amount = Number(payload.amount || 0);
        const before = Number(member.storedValue || 0);
        member.storedValue = before + amount;

        const log = {
          logId: 'W' + Date.now(),
          memberId: member.memberId,
          displayName: member.displayName,
          type: amount >= 0 ? '儲值' : '使用',
          amount,
          beforeStoredValue: before,
          afterStoredValue: member.storedValue,
          payMethod: payload.payMethod || '',
          note: payload.note || '',
          staff: payload.staff || '',
          createdAt: getNowText(),
        };

        demoWalletLogs.unshift(log);

        return {
          member,
          log,
        };
      }

      if (action === 'previewBroadcast') {
        return {
          count: filterMembersByPayload(payload).length,
          members: filterMembersByPayload(payload),
        };
      }

      if (action === 'sendBroadcast') {
        return {
          sentCount: filterMembersByPayload(payload).length,
        };
      }

      return {};
    }

    function filterMembersByPayload(payload) {
      let list = [...demoMembers];

      const minPoints = Number(payload.minPoints || 0);
      const minSpend = Number(payload.minSpend || 0);
      const level = String(payload.level || '').trim();
      const tag = String(payload.tag || '').trim().toLowerCase();
      const hasStoredValue = String(payload.hasStoredValue || '');

      if (minPoints > 0) {
        list = list.filter((m) => Number(m.points || 0) >= minPoints);
      }

      if (minSpend > 0) {
        list = list.filter((m) => Number(m.totalSpend || 0) >= minSpend);
      }

      if (level) {
        list = list.filter((m) => String(m.level || '') === level);
      }

      if (tag) {
        list = list.filter((m) => String(m.tags || '').toLowerCase().includes(tag));
      }

      if (hasStoredValue === 'yes') {
        list = list.filter((m) => Number(m.storedValue || 0) > 0);
      }

      if (hasStoredValue === 'no') {
        list = list.filter((m) => Number(m.storedValue || 0) <= 0);
      }

      return list;
    }

    async function findMemberFromInput(inputId, msgId, resultId) {
      const input = document.getElementById(inputId);
      const keyword = input.value.trim();

      if (!keyword) {
        showMessage(msgId, '請輸入會員編號、電話或姓名。');
        return;
      }

      const loadingId = inputId === 'scanKeyword' ? 'scanQueryLoading' : 'walletQueryLoading';
      const loadingEl = document.getElementById(loadingId);
      const msgEl = document.getElementById(msgId);

      if (loadingEl) {
        loadingEl.classList.add('show');
      }

      if (msgEl) {
        msgEl.textContent = '';
        msgEl.classList.remove('show');
      }

      try {
        const data = await api('findMember', {
          keyword,
        });

        state.selectedMember = data.member;

        document.getElementById(resultId).innerHTML = renderSelectedMember(data.member);

        if (input) {
          input.select();
        }
      } catch (err) {
        state.selectedMember = null;
        document.getElementById(resultId).innerHTML = '<div class="muted">找不到會員。</div>';
        showMessage(msgId, err.message || String(err));
      } finally {
        if (loadingEl) {
          loadingEl.classList.remove('show');
        }
      }
    }

                <input
                  id="walletKeyword"
                  placeholder="掃描會員 QR Code 或輸入 XYYJ-C43A0EA9"
                  value="${escapeHtml(state.selectedMember?.memberId || '')}"
                  autocomplete="off"
                  autofocus
                />
              </div>

              <div class="btn-row">
                <button class="btn green" id="findWalletMemberBtn">查詢會員</button>
                <span class="query-loading" id="walletQueryLoading">查詢中...</span>
              </div>

              <div id="walletMsg" class="message"></div>
            </div>

            <div class="panel">
              <h2 class="panel-title">會員資訊</h2>
              <div id="walletMemberResult">
                ${state.selectedMember ? renderSelectedMember(state.selectedMember) : '<div class="muted">尚未選擇會員。掃碼或查詢後，會員完整資料會顯示在這裡。</div>'}
              </div>
            </div>
          </div>

          <div class="panel">
            <h2 class="panel-title">儲值金處理</h2>

            <div class="form-grid">
              <div class="form-row">
                <label>操作類型</label>
                <select id="walletType">
                  <option value="add">儲值</option>
                  <option value="use">使用</option>
                </select>
              </div>

              <div class="form-row">
                <label>金額</label>
                <input id="walletAmount" type="number" placeholder="例如 500" inputmode="numeric" />
              </div>

              <div class="form-row">
                <label>付款方式</label>
                <select id="payMethod">
                  <option value="">不指定</option>
                  <option value="現金">現金</option>
                  <option value="轉帳">轉帳</option>
                  <option value="刷卡">刷卡</option>
                  <option value="Line Pay">Line Pay</option>
                </select>
              </div>

              <div class="form-row">
                <label>店員</label>
                <input id="staffName" placeholder="例如 店員A" />
              </div>
            </div>

            <div class="form-row">
              <label>備註</label>
              <input id="walletNote" placeholder="例如 現金儲值 / 消費折抵 / 退款調整" />
            </div>

            <div class="btn-row">
              <button class="btn green" id="submitWalletBtn">確認送出</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById('findWalletMemberBtn').onclick = () => {
        findMemberFromInput('walletKeyword', 'walletMsg', 'walletMemberResult');
      };

      const walletKeywordInput = document.getElementById('walletKeyword');

      if (walletKeywordInput) {
        walletKeywordInput.focus();

        walletKeywordInput.addEventListener('keydown', function (event) {
          if (event.key === 'Enter') {
            event.preventDefault();
            findMemberFromInput('walletKeyword', 'walletMsg', 'walletMemberResult');
          }
        });

        walletKeywordInput.addEventListener('input', function () {
          clearTimeout(walletKeywordInput._scanTimer);

          walletKeywordInput._scanTimer = setTimeout(function () {
            const value = walletKeywordInput.value.trim();

            if (value.length >= 8) {
              findMemberFromInput('walletKeyword', 'walletMsg', 'walletMemberResult');
            }
          }, 450);
        });
      }

      document.getElementById('submitWalletBtn').onclick = submitWallet;
    }

    async function submitWallet() {
      const msgId = document.getElementById('walletMsg') ? 'walletMsg' : 'scanMsg';
      const submitBtn = document.getElementById('submitWalletBtn');
      const originalText = submitBtn ? submitBtn.textContent : '確認送出';

      if (!state.selectedMember) {
        showMessage(msgId, '請先掃碼或查詢會員。');
        return;
      }

      const type = document.getElementById('walletType').value;
      const rawAmount = Number(document.getElementById('walletAmount').value || 0);

      if (!rawAmount || rawAmount <= 0) {
        showMessage(msgId, '請輸入正確金額。');
        return;
      }

      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = '送出中...';
        submitBtn.style.opacity = '0.72';
        submitBtn.style.cursor = 'not-allowed';
      }

      const amount = type === 'use' ? -rawAmount : rawAmount;

      const payload = {
        memberId: state.selectedMember.memberId,
        barcodeValue: state.selectedMember.barcodeValue,
        amount,
        payMethod: document.getElementById('payMethod').value,
        staff: document.getElementById('staffName').value.trim(),
        note: document.getElementById('walletNote').value.trim(),
      };

      try {
        const data = await api('adjustStoredValue', payload);

        state.selectedMember = data.member;

        const resultHtml = renderSelectedMember(data.member);

        const scanResult = document.getElementById('scanMemberResult');
        if (scanResult) {
          scanResult.innerHTML = resultHtml;
        }

        const walletResult = document.getElementById('walletMemberResult');
        if (walletResult) {
          walletResult.innerHTML = resultHtml;
        }

        document.getElementById('walletAmount').value = '';
        document.getElementById('walletNote').value = '';

        showMessage(
          msgId,
          '已完成更新。\n目前儲值金：$' + money(data.member.storedValue)
        );
      } catch (err) {
        showMessage(msgId, err.message || String(err));
      } finally {
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          submitBtn.style.opacity = '';
          submitBtn.style.cursor = '';
        }
      }
    }

    function renderLogs() {
      setTitle('儲值金紀錄', '記錄每次儲值金儲值與使用');

      const paint = () => {
        document.getElementById('page').innerHTML = `
          <div class="panel">
            <h2 class="panel-title">儲值金紀錄</h2>
            ${renderWalletLogsTable(state.walletLogs)}
          </div>
        `;
      };

      paint();

      api('getLogs')
        .then((data) => {
          state.pointLogs = data.pointLogs || [];
          state.walletLogs = data.walletLogs || [];

          if (state.page === 'logs') {
            paint();
          }
        })
        .catch((err) => {
          if (state.page === 'logs') {
            document.getElementById('page').innerHTML = `
              <div class="panel">
                <h2 class="panel-title">讀取失敗</h2>
                <div class="message show">${escapeHtml(err.message || String(err))}</div>
              </div>
            `;
          }
        });
    }

    function renderPointLogsTable(list) {
      if (!list.length) {
        return `<div class="muted">目前沒有儲值金紀錄。</div>`;
      }

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>時間</th>
                <th>會員</th>
                <th>類型</th>
                <th>異動儲值金</th>
                <th>異動前</th>
                <th>異動後</th>
                <th>店員</th>
                <th>備註</th>
              </tr>
            </thead>
            <tbody>
              ${list.map((l) => `
                <tr>
                  <td>${escapeHtml(l.createdAt)}</td>
                  <td>
                    <div class="member-name">${escapeHtml(l.displayName)}</div>
                    <div class="muted">${escapeHtml(l.memberId)}</div>
                  </td>
                  <td><span class="tag ${Number(l.points) >= 0 ? 'green' : 'red'}">${escapeHtml(l.type)}</span></td>
                  <td>${money(l.points)}</td>
                  <td>${money(l.beforePoints)}</td>
                  <td>${money(l.afterPoints)}</td>
                  <td>${escapeHtml(l.staff || '')}</td>
                  <td>${escapeHtml(l.note || '')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderWalletLogsTable(list) {
      if (!list.length) {
        return `<div class="muted">目前沒有儲值金紀錄。</div>`;
      }

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>時間</th>
                <th>會員</th>
                <th>類型</th>
                <th>金額</th>
                <th>異動前</th>
                <th>異動後</th>
                <th>付款方式</th>
                <th>店員</th>
                <th>備註</th>
              </tr>
            </thead>
            <tbody>
              ${list.map((l) => `
                <tr>
                  <td>${escapeHtml(l.createdAt)}</td>
                  <td>
                    <div class="member-name">${escapeHtml(l.displayName)}</div>
                    <div class="muted">${escapeHtml(l.memberId)}</div>
                  </td>
                  <td><span class="tag ${Number(l.amount) >= 0 ? 'green' : 'red'}">${escapeHtml(l.type)}</span></td>
                  <td>$${money(l.amount)}</td>
                  <td>$${money(l.beforeStoredValue)}</td>
                  <td>$${money(l.afterStoredValue)}</td>
                  <td>${escapeHtml(l.payMethod || '')}</td>
                  <td>${escapeHtml(l.staff || '')}</td>
                  <td>${escapeHtml(l.note || '')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    document.querySelectorAll('.nav button').forEach((btn) => {
      btn.onclick = () => {
        setPage(btn.dataset.page);
      };
    });

    render();
    preloadData();
  </script>
</body>
</html>
